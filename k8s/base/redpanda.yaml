apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: job-platform
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - 512M
            - --reserve-memory
            - 0M
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://redpanda.job-platform.svc.cluster.local:9092
          ports:
            - containerPort: 9092
              name: kafka
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: job-platform
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
