services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rpk cluster info -X brokers=redpanda:9092 >/dev/null 2>&1; do sleep 1; done
        partitions="$$(rpk topic describe jobs -X brokers=redpanda:9092 2>/dev/null | awk '/PARTITIONS/ {print $$2}')"
        if [ -z "$$partitions" ]; then
          rpk topic create jobs -p 6 -r 1 -X brokers=redpanda:9092
        elif [ "$$partitions" -lt 6 ]; then
          add_count="$$(expr 6 - "$$partitions")"
          rpk topic add-partitions jobs --num "$$add_count" -X brokers=redpanda:9092
        else
          echo "jobs topic already has $$partitions partitions"
        fi
    depends_on:
      - redpanda

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    mem_limit: 1g
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    restart: unless-stopped
    mem_limit: 768m
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    ports:
      - "12201:12201/udp"
      - "5500:5000"
    volumes:
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600/_node/pipelines >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 90s

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  order-api:
    build:
      context: .
      dockerfile: services/order-api/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JOB_TOPIC: jobs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      topic-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      logstash:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: udp://localhost:12201
        tag: order-api

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JOB_TOPIC: jobs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    restart: unless-stopped
    depends_on:
      topic-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      logstash:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: udp://localhost:12201
        tag: worker

  healing-controller:
    build:
      context: .
      dockerfile: services/healing-controller/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      HEALING_DRY_RUN: "true"
      HEALING_INTERVAL_SECONDS: "10"
      HEALING_QUEUED_THRESHOLD: "10"
      HEALING_FAILED_THRESHOLD: "3"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      logstash:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: udp://localhost:12201
        tag: healing-controller
