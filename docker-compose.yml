services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "12201:12201/udp"
      - "5000:5000"
    volumes:
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  job-api:
    build:
      context: .
      dockerfile: services/job-api/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JOB_TOPIC: jobs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - redpanda
      - redis
      - logstash
    logging:
      driver: gelf
      options:
        gelf-address: udp://localhost:12201
        tag: job-api

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JOB_TOPIC: jobs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    restart: unless-stopped
    depends_on:
      - redpanda
      - redis
      - logstash
    logging:
      driver: gelf
      options:
        gelf-address: udp://localhost:12201
        tag: worker

  healing-controller:
    build:
      context: .
      dockerfile: services/healing-controller/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      HEALING_DRY_RUN: "true"
      HEALING_INTERVAL_SECONDS: "10"
      HEALING_QUEUED_THRESHOLD: "10"
      HEALING_FAILED_THRESHOLD: "3"
    restart: unless-stopped
    depends_on:
      - redis
      - logstash
    logging:
      driver: gelf
      options:
        gelf-address: udp://localhost:12201
        tag: healing-controller
