services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rpk cluster info -X brokers=redpanda:9092 >/dev/null 2>&1; do sleep 1; done
        partitions="$$(rpk topic describe jobs -X brokers=redpanda:9092 2>/dev/null | awk '/PARTITIONS/ {print $$2}')"
        if [ -z "$$partitions" ]; then
          rpk topic create jobs -p 6 -r 1 -X brokers=redpanda:9092
        elif [ "$$partitions" -lt 6 ]; then
          add_count="$$(expr 6 - "$$partitions")"
          rpk topic add-partitions jobs --num "$$add_count" -X brokers=redpanda:9092
        else
          echo "jobs topic already has $$partitions partitions"
        fi
    depends_on:
      - redpanda

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  order-api:
    image: local/order-api:jenkins-local
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JOB_TOPIC: jobs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      topic-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    image: local/job-worker:jenkins-local
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JOB_TOPIC: jobs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      topic-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  healing-controller:
    image: local/healing-controller:jenkins-local
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      HEALING_DRY_RUN: "true"
      HEALING_INTERVAL_SECONDS: "10"
      HEALING_QUEUED_THRESHOLD: "10"
      HEALING_FAILED_THRESHOLD: "3"
    depends_on:
      - redis
    restart: unless-stopped
