- name: Update Job API image
  ansible.builtin.command: kubectl -n {{ namespace }} set image deployment/job-api job-api={{ job_api_image }}
  changed_when: true

- name: Update worker image
  ansible.builtin.command: kubectl -n {{ namespace }} set image deployment/job-worker worker={{ worker_image }}
  changed_when: true

- name: Update healing controller image
  ansible.builtin.command: kubectl -n {{ namespace }} set image deployment/healing-controller healing-controller={{ healing_image }}
  changed_when: true

- name: Wait for rolling updates
  ansible.builtin.command: kubectl -n {{ namespace }} rollout status deployment/{{ item }} --timeout=180s
  loop:
    - job-api
    - job-worker
    - healing-controller
  changed_when: false

