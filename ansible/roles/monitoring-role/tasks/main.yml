- name: Deploy ELK stack
  ansible.builtin.command: kubectl apply -f ../observability/k8s/elk-stack.yaml
  args:
    chdir: "{{ playbook_dir }}"
  changed_when: true

- name: Deploy Filebeat log collector
  ansible.builtin.command: kubectl apply -f ../observability/k8s/filebeat-daemonset.yaml
  args:
    chdir: "{{ playbook_dir }}"
  changed_when: true

- name: Show Kibana access command
  ansible.builtin.debug:
    msg: "Run: kubectl -n observability port-forward svc/kibana 5601:5601"

