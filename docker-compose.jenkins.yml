services:
  jenkins:
    build:
      context: .
      dockerfile: infra/jenkins/Dockerfile
    container_name: chaos-platform-jenkins
    user: root
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
      CASC_JENKINS_CONFIG: /usr/share/jenkins/ref/casc.yaml
      PROJECT_REPO_URL: file:///workspace/project
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace/project
      - ${DOCKER_HOST_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube:ro
    restart: unless-stopped

volumes:
  jenkins_home:
